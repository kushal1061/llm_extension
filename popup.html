<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');

    :root {
      --bg: #f6f8fc;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --border: rgba(15, 23, 42, 0.08);

      --blue: #2563eb;
      --green: #10b981;
      --purple: #7c3aed;
      --orange: #f59e0b;

      --shadow: 0 6px 18px rgba(0,0,0,0.06);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      width: 340px;
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    /* HEADER */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 18px;
      background: var(--card);
      border-bottom: 1px solid var(--border);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-icon {
      width: 30px;
      height: 30px;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--blue), var(--purple));
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: var(--shadow);
    }

    .logo-name {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: -0.2px;
    }

    /* TOGGLE */
    .toggle {
      position: relative;
      width: 38px;
      height: 22px;
    }

    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      inset: 0;
      background: #e5e7eb;
      border-radius: 999px;
      transition: 0.2s;
    }

    .slider:before {
      content: "";
      position: absolute;
      height: 16px;
      width: 16px;
      left: 3px;
      top: 3px;
      background: white;
      border-radius: 50%;
      transition: 0.2s;
      box-shadow: 0 2px 6px rgba(0,0,0,0.15);
    }

    .toggle input:checked + .slider {
      background: linear-gradient(135deg, var(--green), var(--blue));
    }

    .toggle input:checked + .slider:before {
      transform: translateX(16px);
    }

    /* GRID */
    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      padding: 14px;
    }

    .stat-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px;
      box-shadow: var(--shadow);
    }

    .stat-card.accent {
      background: linear-gradient(135deg, #eef2ff, #ecfeff);
      border: 1px solid rgba(37, 99, 235, 0.15);
    }

    .stat-label {
      font-size: 10px;
      font-family: 'JetBrains Mono', monospace;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.6px;
    }

    .stat-value {
      font-size: 22px;
      font-weight: 600;
      margin-top: 6px;
    }

    .stat-sub {
      font-size: 11px;
      color: var(--muted);
      margin-top: 4px;
    }

    .full {
      grid-column: 1 / -1;
    }

    /* SECTION */
    .section-title {
      font-size: 10px;
      font-family: 'JetBrains Mono', monospace;
      color: var(--muted);
      padding: 0 14px 6px;
      text-transform: uppercase;
    }

    /* MODE */
    .mode-box {
      padding: 0 14px 12px;
    }

    .mode-row {
      display: flex;
      gap: 8px;
    }

    .mode-btn {
      flex: 1;
      padding: 8px;
      font-size: 11px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: white;
      cursor: pointer;
      color: var(--muted);
      transition: 0.2s;
    }

    .mode-btn:hover {
      transform: translateY(-1px);
    }

    .mode-btn.active {
      background: linear-gradient(135deg, #e0f2fe, #ede9fe);
      border-color: rgba(37, 99, 235, 0.2);
      color: var(--blue);
      font-weight: 500;
    }

    /* DROPDOWN */
    .dropdown {
      margin-top: 8px;
      width: 100%;
      padding: 9px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: white;
      font-size: 11px;
      color: var(--text);
      outline: none;
    }

    /* DIVIDER */
    .divider {
      height: 1px;
      background: var(--border);
      margin: 10px 14px;
    }

    /* FOOTER */
    .footer {
      display: flex;
      justify-content: space-between;
      padding: 10px 14px 14px;
      font-size: 11px;
      color: var(--muted);
    }

    .reset-btn {
      border: none;
      background: none;
      color: var(--blue);
      cursor: pointer;
      font-weight: 500;
    }

    .reset-btn:hover {
      text-decoration: underline;
    }

  </style>
</head>

<body>

  <div class="header">
    <div class="logo">
      <div class="logo-icon"></div>
      <div class="logo-name">Eco Query</div>
    </div>
  </div>

  <div class="stats-grid">

    <div class="stat-card accent">
      <div class="stat-label">Tokens Saved</div>
      <div class="stat-value" id="tokensSaved">0</div>
      <div class="stat-sub">optimization impact</div>
    </div>

    <div class="stat-card">
      <div class="stat-label">Local Queries</div>
      <div class="stat-value" id="localQueries">0</div>
      <div class="stat-sub">on-device processing</div>
    </div>

    <div class="stat-card">
      <div class="stat-label">Cloud Queries</div>
      <div class="stat-value" id="cloudQueries">0</div>
      <div class="stat-sub">LLM API usage</div>
    </div>


  </div>

  <div class="divider"></div>

  <div class="section-title">Mode Control</div>

  <div class="mode-box">
    <div class="mode-row">
      <button class="mode-btn active">Local</button>
      <button class="mode-btn">Cloud</button>
      <button class="mode-btn">Hybrid</button>
    </div>

    <select class="dropdown" id="modelDropdown">
  <option disabled>Loading models...</option>
</select>
  </div>




  <script type="module" src="popup.js"></script>
  
</body>
</html>
